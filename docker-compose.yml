# Postgres local para desarrollo / demo (RNF4).
# Levantar:  docker compose up -d
# DATABASE_URL="postgresql://postgres:postgres@localhost:5432/energy_optimizer"
services:
  db:
    image: postgres:16-alpine
    container_name: energy_optimizer_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: energy_optimizer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d energy_optimizer"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
