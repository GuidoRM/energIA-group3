<body class="h-full flex items-center justify-center bg-surface p-margin-mobile md:p-margin-desktop text-on-surface">
<main class="w-full max-w-md mx-auto">
<!-- Header Section -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary-container text-on-primary-container mb-4 shadow-sm border border-outline-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<h1 class="text-headline-lg-mobile font-headline-lg-mobile md:text-headline-lg md:font-headline-lg text-on-surface mb-2">Iniciar sesión</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">Austral Energy Optimizer</p>
</div>
<!-- Bento Card for Form -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-card-padding">
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div>
<label class="block text-label-sm font-label-sm text-[#1a1a1a] uppercase tracking-wider mb-2" for="email">Correo Electrónico</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">email</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface text-body-md font-body-md text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary focus:border-primary transition-shadow duration-200" id="email" name="email" placeholder="tu@empresa.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex items-center justify-between mb-2">
<label class="block text-label-sm font-label-sm text-[#1a1a1a] uppercase tracking-wider" for="password">Contraseña</label>
<a class="text-label-sm font-label-sm text-primary hover:text-primary-container transition-colors" href="#">¿Olvidé mi contraseña?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface text-body-md font-body-md text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary focus:border-primary transition-shadow duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-full shadow-sm text-label-lg font-label-lg text-white bg-[#fd5212] hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 active:scale-[0.98]" type="submit">
                        Iniciar Sesión
                    </button>
</div>
</form>
<!-- Registration Link -->
<div class="mt-6 text-center">
<p class="text-body-md font-body-md text-on-surface-variant">
                    ¿No tengo una cuenta? 
                    <a class="font-label-lg text-primary hover:text-primary-container transition-colors" href="#">Registrarme</a>
</p>
</div>
</div>
