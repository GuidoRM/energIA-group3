<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Crear Organización - EnergiOptima</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#d1e4ff",
                        "inverse-primary": "#ffb59e",
                        "tertiary": "#005f9f",
                        "surface-container-low": "#fff1ed",
                        "surface-container-high": "#ffe2da",
                        "primary-fixed-dim": "#ffb59e",
                        "surface-dim": "#f2d4cb",
                        "surface-tint": "#ae3200",
                        "surface-container": "#ffe9e3",
                        "secondary-container": "#fc845e",
                        "inverse-on-surface": "#ffede8",
                        "on-primary-fixed-variant": "#852400",
                        "tertiary-container": "#0078c7",
                        "background": "#fff8f6",
                        "surface-variant": "#fbdcd3",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#00497c",
                        "secondary-fixed-dim": "#ffb59e",
                        "on-error-container": "#93000a",
                        "secondary": "#a13f1f",
                        "secondary-fixed": "#ffdbd0",
                        "primary-fixed": "#ffdbd0",
                        "primary-container": "#d53f00",
                        "on-primary-fixed": "#3a0a00",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#fbdcd3",
                        "primary": "#aa3000",
                        "on-secondary-fixed": "#3a0a00",
                        "on-surface": "#281813",
                        "tertiary-fixed-dim": "#9ecaff",
                        "on-surface-variant": "#5c4038",
                        "inverse-surface": "#3e2c27",
                        "surface-bright": "#fff8f6",
                        "surface": "#fff8f6",
                        "on-secondary-fixed-variant": "#812809",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "outline": "#907066",
                        "on-tertiary-fixed": "#001d36",
                        "on-tertiary-container": "#fdfcff",
                        "on-secondary-container": "#711d00",
                        "outline-variant": "#e5beb3",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fffbff",
                        "on-background": "#281813"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "card-padding": "24px",
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "margin-desktop": "32px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fff8f6; /* background */
            color: #281813; /* on-background */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">
<!-- Note: TopAppBar and SideNavBar are suppressed here due to the Linear/Transactional intent (Create Organization). -->
<main class="w-full max-w-[1024px] grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-surface-container-lowest rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-outline-variant overflow-hidden">
<!-- Illustration / Context Side -->
<div class="hidden md:flex flex-col justify-center items-center p-12 bg-surface-container h-full">
<div class="text-primary mb-6">
<span class="material-symbols-outlined icon-fill" style="font-size: 120px;">factory</span>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface text-center mb-4">Optimización Energética Industrial</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant text-center max-w-[300px]">
                Configura tu organización para comenzar a monitorear y gestionar el consumo de energía con precisión en entornos industriales.
            </p>
</div>
<!-- Form Side -->
<div class="p-6 md:p-12 w-full max-w-md mx-auto">
<div class="mb-8">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Crear Organización</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Ingresa los datos de la planta o empresa para comenzar.</p>
</div>
<form class="space-y-6">
<!-- Nombre de la Organización -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-1" for="orgName">Nombre de la Organización</label>
<input class="w-full bg-surface-container-lowest border border-outline text-on-surface font-body-md text-body-md rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" id="orgName" name="orgName" placeholder="ej. Planta Industrial Río Grande" type="text"/>
</div>
<!-- CUIT / Identificación Fiscal -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-1" for="cuit">CUIT / Identificación Fiscal</label>
<input class="w-full bg-surface-container-lowest border border-outline text-on-surface font-body-md text-body-md rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" id="cuit" name="cuit" placeholder="30-00000000-0" type="text"/>
</div>
<!-- Dirección de la Planta -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-1" for="address">Dirección de la Planta</label>
<input class="w-full bg-surface-container-lowest border border-outline text-on-surface font-body-md text-body-md rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" id="address" name="address" placeholder="Av. Industrial 1234" type="text"/>
</div>
<!-- Rubro Industrial -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-1" for="industry">Rubro Industrial</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest border border-outline text-on-surface font-body-md text-body-md rounded-lg px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" id="industry" name="industry">
<option disabled="" selected="" value="">Selecciona un rubro</option>
<option value="plasticos">Plásticos</option>
<option value="autopartes">Autopartes</option>
<option value="textil">Textil</option>
<option value="alimentaria">Alimentaria</option>
<option value="otro">Otro</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Tipo de Energía Principal -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-3">Tipo de Energía Principal</label>
<div class="grid grid-cols-3 gap-3">
<label class="cursor-pointer">
<input class="peer sr-only" name="energyType" type="radio" value="gas"/>
<div class="rounded-lg border border-outline bg-surface-container-lowest py-2 px-3 text-center hover:bg-surface-container-low peer-checked:bg-primary-container peer-checked:border-primary peer-checked:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-xl mb-1">local_fire_department</span>
<span class="block font-label-sm text-label-sm">Gas</span>
</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="energyType" type="radio" value="electricidad"/>
<div class="rounded-lg border border-outline bg-surface-container-lowest py-2 px-3 text-center hover:bg-surface-container-low peer-checked:bg-primary-container peer-checked:border-primary peer-checked:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-xl mb-1">bolt</span>
<span class="block font-label-sm text-label-sm">Eléctrica</span>
</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="energyType" type="radio" value="ambos"/>
<div class="rounded-lg border border-outline bg-surface-container-lowest py-2 px-3 text-center hover:bg-surface-container-low peer-checked:bg-primary-container peer-checked:border-primary peer-checked:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-xl mb-1">dashboard</span>
<span class="block font-label-sm text-label-sm">Ambos</span>
</div>
</label>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-[#fd5212] hover:bg-[#e0450d] text-white font-label-lg text-label-lg rounded-full py-3 px-6 shadow-sm hover:shadow-md transition-all active:scale-[0.98] flex justify-center items-center gap-2" type="button">
<span>Crear Organización</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<div class="mt-4 text-center">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">Cancelar y volver</a>
</div>
</div>
</form>
</div>
</main>
</body></html>
